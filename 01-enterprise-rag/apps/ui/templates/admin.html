<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise RAG — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">Admin Panel</h1>
        <div class="grid grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="text-xl font-semibold mb-4">Audit Logs</h2>
                <div id="audit-logs"></div>
            </div>
            <div class="bg-white p-6 rounded shadow">
                <h2 class="text-xl font-semibold mb-4">System Health</h2>
                <div id="system-health"></div>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/governance/audit-logs/')
            .then(r => r.json())
            .then(data => {
                document.getElementById('audit-logs').innerHTML = data.slice(0, 20).map(log =>
                    `<div class="mb-1 text-sm">${log.action} — ${log.user} — ${new Date(log.timestamp).toLocaleString()}</div>`
                ).join('');
            });
    </script>
</body>
</html>
